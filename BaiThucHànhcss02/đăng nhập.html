<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- <meta name="viewport" content="width=device-width, initial-scale=1.0"> -->
    <title>Document</title>
    <link rel ="stylesheet" href = "dtf.css">
</head>
<body>
    <form>

        <div class = "container">
            <p id = "header"><b>Get in touch with us by filling contact form below</b></p>
            <div class = "row" >
                <input type = "text" placeholder="* Enter your full name" id = "name" class = "one:one">
                <input type = "text" placeholder="* Enter your address" id = "adress"class = "one:one">
            </div>

            <div class = "row">
                <input type = "text" placeholder = "Enter your subject" id = "subject"class = "one:one">
            </div>

            <div class="row">
                <textarea id = "message"placeholder="* Your message here..." class="one-one"></textarea>
            </div>

            <div class = "row between">
                <button  type = "submit" id = "send-button" >Send message</button>
                <p>* Please fill all required form field, thanks!</p>
            </div>
        </div>

    </form>
</body>
</html>
